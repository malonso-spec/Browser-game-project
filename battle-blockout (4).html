<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Combate por Turnos</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{min-height:100vh;background:linear-gradient(135deg,#1a1a2e 0%,#16213e 50%,#0f3460 100%);font-family:'Segoe UI',sans-serif;display:flex;flex-direction:column;align-items:center;padding:15px;color:#fff}
h1{font-size:1.5rem;margin-bottom:8px;text-shadow:0 0 20px rgba(255,255,255,0.3)}
.game-info{display:flex;gap:20px;margin-bottom:10px;font-size:0.85rem;color:#94a3b8}
.game-info span{background:rgba(0,0,0,0.3);padding:4px 12px;border-radius:20px}
.arena{position:relative;width:100%;max-width:700px;aspect-ratio:16/9;border-radius:16px;margin-bottom:15px;overflow:hidden;background:#000}
.arena-video{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;z-index:0}
.fighter{position:absolute;display:flex;flex-direction:column;align-items:center;gap:5px;z-index:2}
.fighter.player-side{bottom:15px;left:15px}
.fighter.enemy-side{bottom:15px;right:15px}
.shake{animation:shake 0.4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.health-bar{width:110px;height:14px;background:rgba(0,0,0,0.7);border-radius:8px;overflow:hidden;border:2px solid #555}
.health-fill{height:100%;transition:width 0.4s ease;border-radius:6px}
.player-health{background:linear-gradient(90deg,#00d9ff,#0077ff)}
.enemy-health{background:linear-gradient(90deg,#ff4757,#ff6b81)}
.health-text{font-size:0.8rem;font-weight:bold;text-shadow:0 1px 3px rgba(0,0,0,0.8)}
.enemy-state{position:absolute;top:10px;right:15px;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#78350f;padding:6px 14px;border-radius:20px;font-size:0.8rem;font-weight:bold;box-shadow:0 2px 10px rgba(251,191,36,0.4);z-index:2}
.turn-info{position:absolute;top:10px;left:15px;background:rgba(0,0,0,0.6);padding:6px 14px;border-radius:20px;font-size:0.8rem;z-index:2}
.bonus-indicator{position:absolute;bottom:10px;left:50%;transform:translateX(-50%);font-size:0.75rem;padding:4px 12px;border-radius:12px;z-index:2}
.bonus-available{background:rgba(251,191,36,0.2);color:#fbbf24;border:1px solid #fbbf24}
.bonus-used{background:rgba(16,185,129,0.2);color:#10b981;border:1px solid #10b981}
.bonus-missed{background:rgba(239,68,68,0.2);color:#ef4444;border:1px solid #ef4444}
.cards{display:flex;gap:10px;flex-wrap:wrap;justify-content:center;max-width:580px;margin-bottom:12px}
.card{width:100px;height:140px;background:linear-gradient(145deg,#2d3748,#1a202c);border:3px solid #4a5568;border-radius:10px;cursor:pointer;transition:all 0.3s;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;position:relative}
.card:hover:not(.used):not(.disabled){transform:translateY(-8px);box-shadow:0 8px 25px rgba(0,0,0,0.4)}
.card.bonus-match:not(.used):not(.disabled){border-color:#fbbf24;box-shadow:0 0 15px rgba(251,191,36,0.4)}
.card.used{opacity:0.25;cursor:not-allowed;transform:scale(0.92)}
.card.disabled{opacity:0.5;cursor:not-allowed}
.card-letter{position:absolute;top:6px;left:8px;font-size:0.7rem;font-weight:bold;color:#64748b}
.card-icon{font-size:1.8rem}
.card-name{font-size:0.65rem;font-weight:bold;text-align:center;color:#e2e8f0}
.card-damage{font-size:0.75rem;color:#94a3b8}
.card-damage strong{color:#ff6b6b}
.card-bonus{font-size:0.6rem;color:#fbbf24;opacity:0.8}
.card.heal .card-damage strong{color:#10b981}
.log{width:100%;max-width:580px;background:rgba(0,0,0,0.4);border-radius:10px;padding:12px;max-height:100px;overflow-y:auto}
.log-entry{padding:4px 0;border-bottom:1px solid rgba(255,255,255,0.1);font-size:0.8rem}
.log-entry:last-child{border:none}
.player-action{color:#00d9ff}
.enemy-action{color:#ff6b81}
.enemy-crit{color:#ff0040;font-weight:bold}
.system-msg{color:#ffd700}
.bonus-msg{color:#10b981}
.result{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.9);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:15px;z-index:100}
.result h2{font-size:2.2rem;text-shadow:0 0 30px currentColor}
.result p{font-size:1rem;color:#94a3b8;max-width:300px;text-align:center}
.result.win h2{color:#10b981}
.result.lose h2{color:#ff4757}
.btn{padding:10px 25px;font-size:0.95rem;border:none;border-radius:8px;cursor:pointer;background:linear-gradient(135deg,#667eea,#764ba2);color:#fff;font-weight:bold;transition:transform 0.2s}
.btn:hover{transform:scale(1.05)}
.hidden{display:none}
.hint{font-size:0.7rem;color:#64748b;text-align:center;margin-top:8px;max-width:400px}
.state-hint{display:inline-block;background:rgba(251,191,36,0.15);color:#fbbf24;padding:2px 8px;border-radius:4px;margin-left:4px}
.crit-alert{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);font-size:3rem;font-weight:bold;color:#ff0040;text-shadow:0 0 30px #ff0040;animation:critPop 0.6s ease-out forwards;pointer-events:none;z-index:50}
@keyframes critPop{0%{opacity:0;transform:translate(-50%,-50%) scale(0.5)}50%{opacity:1;transform:translate(-50%,-50%) scale(1.2)}100%{opacity:0;transform:translate(-50%,-50%) scale(1)}}
</style>
</head>
<body>
<h1>⚔️ Combate por Turnos</h1>
<div class="game-info">
  <span>Turnos: <strong id="turnCount">1</strong>/5</span>
  <span>Cartas restantes: <strong id="cardsLeft">5</strong></span>
</div>

<div class="arena">
  <video class="arena-video" autoplay loop muted playsinline src="Game01/Default - default.mp4"></video>
  <div class="turn-info">Turno <span id="currentTurn">1</span></div>
  <div class="enemy-state" id="enemyState">Estado: Cargando...</div>
  
  <div class="fighter player-side" id="playerFighter">
    <div class="health-bar"><div class="health-fill player-health" id="playerHealthBar" style="width:100%"></div></div>
    <span class="health-text">Jugador: <span id="playerHP">100</span>%</span>
  </div>
  
  <div class="fighter enemy-side" id="enemyFighter">
    <div class="health-bar"><div class="health-fill enemy-health" id="enemyHealthBar" style="width:100%"></div></div>
    <span class="health-text">Enemigo: <span id="enemyHP">100</span>%</span>
  </div>
  
  <div class="bonus-indicator bonus-available" id="bonusIndicator">⚡ Bonus: T1 +10p | T2 +20p | T3 +30p</div>
</div>

<div class="cards" id="cards"></div>

<div class="hint">
  💡 <strong>Pista:</strong> El enemigo está <span class="state-hint" id="stateHint">...</span> — ¡Encuentra la carta correcta para activar el bonus!
</div>

<div class="log" id="log"></div>

<div class="result hidden" id="result">
  <h2 id="resultText"></h2>
  <p id="resultDesc"></p>
  <button class="btn" onclick="restart()">Jugar de nuevo</button>
</div>

<div class="crit-alert hidden" id="critAlert">¡CRÍTICO!</div>

<script>
const STATES = ['Eufórico','Ebrio','Agobiado','Empanado'];
const STATE_CARD_MAP = {Eufórico:'A',Ebrio:'B',Agobiado:'C',Empanado:'D'};

const CARDS = [
  {id:'A',name:'Golpe Rápido',icon:'⚡',baseDmg:25,state:'Eufórico',hasBonus:true},
  {id:'B',name:'Ataque Fuerte',icon:'💪',baseDmg:25,state:'Ebrio',hasBonus:true},
  {id:'C',name:'Golpe Crítico',icon:'💥',baseDmg:20,state:'Agobiado',hasBonus:true},
  {id:'D',name:'Devastación',icon:'🔥',baseDmg:20,state:'Empanado',hasBonus:true},
  {id:'R',name:'Recuperación',icon:'💚',heal:25,isHeal:true}
];

const VIDEO_DEFAULT = 'Game01/Default - default.mp4';
const VIDEO_ENEMY_ATTACK = 'Game01/User default - Bot ataque.mp4';

const CRIT_CHANCE = 0.33;
const ENEMY_DMG = 25;
const ENEMY_DMG_BLOCKED = 10;
const ENEMY_CRIT_DMG = 50;
const BONUS_PER_TURN = {1: 10, 2: 20, 3: 30};

let playerHP,enemyHP,turn,usedCards,enemyState,bonusUsed,bonusAvailable,isProcessing,shieldActive,enemyCritUsed;

function init(){
  playerHP=100;enemyHP=100;turn=1;usedCards=[];bonusUsed=false;bonusAvailable=true;isProcessing=false;shieldActive=false;enemyCritUsed=false;
  enemyState=STATES[Math.floor(Math.random()*STATES.length)];
  
  updateUI();
  document.getElementById('enemyState').textContent='Estado: '+enemyState;
  document.getElementById('stateHint').textContent=enemyState;
  document.getElementById('log').innerHTML='';
  document.getElementById('result').classList.add('hidden');
  document.getElementById('bonusIndicator').className='bonus-indicator bonus-available';
  document.getElementById('bonusIndicator').textContent='⚡ Bonus: T1 +10p | T2 +20p | T3 +30p';
  
  renderCards();
  playVideo(VIDEO_DEFAULT, true);
  addLog(`¡Combate iniciado! El enemigo está ${enemyState}.`,'system-msg');
  addLog('⚡ Bonus escalonado: T1 +10p | T2 +20p | T3 +30p ¡Arriesga para ganar más!','system-msg');
}

function updateUI(){
  document.getElementById('playerHP').textContent=playerHP;
  document.getElementById('enemyHP').textContent=enemyHP;
  document.getElementById('playerHealthBar').style.width=playerHP+'%';
  document.getElementById('enemyHealthBar').style.width=enemyHP+'%';
  document.getElementById('turnCount').textContent=turn;
  document.getElementById('currentTurn').textContent=turn;
  document.getElementById('cardsLeft').textContent=5-usedCards.length;
}

function renderCards(){
  const container=document.getElementById('cards');
  const bonusCard=STATE_CARD_MAP[enemyState];
  
  container.innerHTML=CARDS.map(c=>{
    const isUsed=usedCards.includes(c.id);
    const isBonusMatch=c.id===bonusCard&&!bonusUsed&&turn<=3;
    const classes=['card'];
    if(isUsed)classes.push('used');
    if(isProcessing)classes.push('disabled');
    if(isBonusMatch&&!isUsed)classes.push('bonus-match');
    if(c.isHeal)classes.push('heal');
    
    return `
      <div class="${classes.join(' ')}" onclick="playCard('${c.id}')" data-id="${c.id}">
        <span class="card-letter">${c.id}</span>
        <span class="card-icon">${c.icon}</span>
        <span class="card-name">${c.name}</span>
        ${c.isHeal?`
          <span class="card-damage"><strong>+${c.heal}p</strong> HP</span>
        `:`
          <span class="card-damage">Daño: <strong>${c.baseDmg}p</strong></span>
          ${c.hasBonus?`<span class="card-bonus">+Bonus si ${c.state}</span>`:''}
        `}
      </div>
    `;
  }).join('');
}

function addLog(msg,type){
  const log=document.getElementById('log');
  log.innerHTML+=`<div class="log-entry ${type}">[T${turn}] ${msg}</div>`;
  log.scrollTop=log.scrollHeight;
}

function shake(el){
  if(!el)return;
  el.classList.add('shake');
  setTimeout(()=>el.classList.remove('shake'),400);
}

function playVideo(src, loop=false){
  const video = document.querySelector('.arena-video');
  video.src = src;
  video.loop = loop;
  video.play();
}

function playEnemyAttackVideo(){
  return new Promise(resolve=>{
    const video = document.querySelector('.arena-video');
    playVideo(VIDEO_ENEMY_ATTACK, false);
    video.onended = ()=>{
      playVideo(VIDEO_DEFAULT, true);
      video.onended = null;
      resolve();
    };
  });
}

function showCritAlert(){
  const alert=document.getElementById('critAlert');
  alert.classList.remove('hidden');
  setTimeout(()=>alert.classList.add('hidden'),600);
}

async function playCard(id){
  if(usedCards.includes(id)||isProcessing||enemyHP<=0||playerHP<=0||turn>5)return;
  
  isProcessing=true;
  usedCards.push(id);
  const card=CARDS.find(c=>c.id===id);
  const bonusCard=STATE_CARD_MAP[enemyState];
  
  renderCards();
  await delay(200);
  
  if(card.isHeal){
    const oldHP=playerHP;
    playerHP=Math.min(100,playerHP+card.heal);
    const healed=playerHP-oldHP;
    shieldActive=true;
    addLog(`Usas ${card.name}: +${healed}p HP (${oldHP}% → ${playerHP}%) 🛡️ ¡Blindado!`,'bonus-msg');
  }else{
    let dmg=card.baseDmg;
    
    if(id===bonusCard&&!bonusUsed&&turn<=3){
      const bonusAmount = BONUS_PER_TURN[turn];
      dmg+=bonusAmount;
      bonusUsed=true;
      document.getElementById('bonusIndicator').className='bonus-indicator bonus-used';
      document.getElementById('bonusIndicator').textContent=`✓ Bonus T${turn}: +${bonusAmount}p`;
      addLog(`¡BONUS T${turn}! ${card.name}: -${dmg}p (${card.baseDmg}+${bonusAmount})`,'bonus-msg');
    }else{
      addLog(`Usas ${card.name}: -${dmg}p al enemigo`,'player-action');
    }
    
    enemyHP=Math.max(0,enemyHP-dmg);
    shake(document.getElementById('enemyFighter'));
  }
  
  updateUI();
  await delay(600);
  
  if(enemyHP<=0){
    if(bonusUsed){
      endGame(true,'¡Activaste el bonus y derrotaste al enemigo!');
    }else{
      endGame(false,'Derrotaste al enemigo pero sin activar el bonus. ¡El bonus es obligatorio para ganar!');
    }
    return;
  }
  
  if(turn>3&&!bonusUsed){
    document.getElementById('bonusIndicator').className='bonus-indicator bonus-missed';
    document.getElementById('bonusIndicator').textContent='✗ Bonus perdido';
  }
  
  await delay(300);
  
  // Reproducir vídeo de ataque enemigo
  await playEnemyAttackVideo();
  
  let enemyDmg;
  
  if(shieldActive){
    enemyDmg = ENEMY_DMG_BLOCKED;
    shieldActive = false;
    addLog(`🛡️ Escudo activo! El enemigo solo hace: -${enemyDmg}p`,'player-action');
  }else if(!enemyCritUsed && Math.random() < CRIT_CHANCE){
    enemyDmg = ENEMY_CRIT_DMG;
    enemyCritUsed = true;
    showCritAlert();
    addLog(`¡CRÍTICO! El enemigo contraataca: -${enemyDmg}p`,'enemy-crit');
  }else{
    enemyDmg = ENEMY_DMG;
    addLog(`El enemigo contraataca: -${enemyDmg}p`,'enemy-action');
  }
  
  playerHP=Math.max(0,playerHP-enemyDmg);
  shake(document.getElementById('playerFighter'));
  updateUI();
  
  await delay(500);
  
  if(playerHP<=0){
    endGame(false,'Tu vida llegó a 0%. ¡Intenta usar Recuperación estratégicamente!');
    return;
  }
  
  turn++;
  
  if(turn>5){
    if(enemyHP>0){
      endGame(false,'Se acabaron los turnos y el enemigo sigue vivo.');
    }
    return;
  }
  
  updateUI();
  isProcessing=false;
  renderCards();
}

function delay(ms){return new Promise(r=>setTimeout(r,ms))}

function endGame(win,reason){
  const result=document.getElementById('result');
  const text=document.getElementById('resultText');
  const desc=document.getElementById('resultDesc');
  result.classList.remove('hidden','win','lose');
  result.classList.add(win?'win':'lose');
  text.textContent=win?'🏆 ¡VICTORIA!':'💀 DERROTA';
  desc.textContent=reason;
  addLog(win?'¡Victoria!':'Derrota: '+reason,'system-msg');
}

function restart(){init()}
init();
</script>
</body>
</html>
