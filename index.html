<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Combate por Turnos</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>
  <!-- Loading screen -->
  <div id="loadingScreen" class="loading-screen">
    <h1 class="loading-title">Loading...</h1>
    <div class="loading-bar-track" id="loadingBar"></div>
  </div>

  <span id="turnCount" class="hidden"></span>
  <span id="cardsLeft" class="hidden"></span>

  <button id="muteBtn" class="mute-btn" title="Silenciar">🔊</button>

  <div class="screen-housing">
  <div class="arena">
    <canvas id="bgCanvas" class="arena-bg"></canvas>
    <canvas id="userCanvas" class="arena-sprite sprite-left"></canvas>
    <canvas id="botCanvas" class="arena-sprite sprite-right"></canvas>
    <canvas id="lightningCanvas" class="arena-lightning-sprite"></canvas>
    <div class="turn-info">Turno <span id="currentTurn">1</span></div>
    <div class="enemy-state" id="enemyState">Estado: Cargando...</div>

    <div class="fighter player-side" id="playerFighter">
      <div class="hp-bar" id="playerHearts">
        <div class="hp-bar-track">
          <div class="hp-bar-fill" style="width:100%"></div>
        </div>
        <span class="hp-heart">★</span>
      </div>
    </div>

    <div class="fighter enemy-side" id="enemyFighter">
      <div class="hp-bar" id="enemyHearts">
        <div class="hp-bar-track">
          <div class="hp-bar-fill" style="width:100%"></div>
        </div>
        <span class="hp-heart">★</span>
      </div>
    </div>

    <div class="bonus-indicator bonus-available" id="bonusIndicator">⚡ Bonus: T1 +10p | T2 +20p | T3 +30p</div>
  </div>
  </div>

  <div class="cards" id="cards"></div>

  <div class="sponsor-logo">
    <img src="assets/freepik-logo.png" alt="Freepik">
  </div>

  <div class="hint">
    💡 <strong>Pista:</strong> El enemigo está <span class="state-hint" id="stateHint">...</span> — ¡Encuentra la carta correcta para activar el bonus!
  </div>

<div class="result hidden" id="result">
    <h2 id="resultText"></h2>
    <p id="resultDesc"></p>
    <button class="btn" onclick="restart()">Jugar de nuevo</button>
  </div>

  <div class="crit-alert hidden" id="critAlert"><img src="assets/Heavy.png" alt="Heavy!"></div>

  <script src="js/config.js"></script>
  <script src="js/ui.js"></script>
  <script src="js/game.js"></script>
</body>
</html>
